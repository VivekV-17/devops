<!DOCTYPE html>
<!-- Declares the document type as HTML5 -->

<html>
<!-- Root element that wraps the entire HTML document -->

<head>
    <!-- Head section: contains metadata and resources like title, CSS, etc. -->

    <title>My First Web Page</title>
    <!-- Sets the title of the web page shown in the browser tab -->

</head>
<!-- End of head section -->

<body>
    <!-- Body section: contains all the visible content of the web page -->

    <h1>Welcome to My Website</h1>
    <!-- Heading level 1: largest heading -->

    <p>This is my first HTML page.</p>
    <!-- Paragraph of text -->

    <hr>
    <!-- Horizontal line: separates sections visually -->

    <marquee>Scrolling Text</marquee>
    <!-- Displays scrolling text (deprecated in HTML5) -->

    <h2>About Me</h2>
    <!-- Heading level 2: smaller than h1 -->

    <p>I am learning HTML and building my first webpage.</p>
    <!-- Another paragraph -->

    <br>
    <!-- Line break: breaks the text to the next line -->

    <b>This text is bold.</b>
    <!-- Bold text -->

    <i>This text is italic.</i>
    <!-- Italic text -->

    <u>This text is underlined.</u>
    <!-- Underlined text -->

    <blockquote>This is a blockquote. It is used for long quotations.</blockquote>
    <!-- Indented block text -->

    <pre>
  Line 1
      Line 2 with indentation
  </pre>
    <!-- Preformatted text: preserves spaces and line breaks -->

</body>
<!-- End of body section -->

</html>
<!-- End of HTML document -->
